<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#f5f0eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Familiekalender" />
  <title>Familiekalender</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <h1 class="app-title">📅 Familiekalender</h1>
    <p class="app-subtitle" id="current-month-label"></p>
  </header>

  <!-- ===== VIEW TOGGLE ===== -->
  <div class="view-toggle">
    <button class="toggle-btn active" id="btn-month" onclick="switchView('month')">Måned</button>
    <button class="toggle-btn" id="btn-list" onclick="switchView('list')">Liste</button>
  </div>

  <!-- ===== MONTH VIEW ===== -->
  <section id="view-month" class="view active">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592; Forrige</button>
      <button class="nav-btn" onclick="changeMonth(1)">Neste &#8594;</button>
    </div>
    <div class="calendar-grid">
      <div class="day-label">Man</div>
      <div class="day-label">Tir</div>
      <div class="day-label">Ons</div>
      <div class="day-label">Tor</div>
      <div class="day-label">Fre</div>
      <div class="day-label">Lør</div>
      <div class="day-label">Søn</div>
    </div>
  </section>

  <!-- ===== LIST VIEW ===== -->
  <section id="view-list" class="view">
    <h2 class="list-heading">Kommende hendelser</h2>
    <div id="event-list"></div>
  </section>

  <!-- ===== BUTTONS ===== -->
  <div class="fab-container">
    <button class="fab-voice" onclick="openVoiceModal()">🎤 Si en hendelse</button>
    <button class="fab" onclick="openModal()">＋ Legg til manuelt</button>
  </div>

  <!-- ===== VOICE MODAL ===== -->
  <div id="voice-modal-overlay" class="modal-overlay hidden" onclick="handleVoiceOverlayClick(event)">
    <div class="modal">
      <h2 class="modal-title">🎤 Si en hendelse</h2>
      <p class="voice-hint">Skriv eller dikter en hendelse med Wispr Flow, så fyller appen inn resten automatisk!</p>
      <p class="voice-example">Eksempel: <em>"13 juni kl 12 kommer farfar på besøk"</em></p>

      <label class="field-label" for="voice-input">Hva skjer?</label>
      <textarea
        id="voice-input"
        class="field-input field-textarea voice-textarea"
        placeholder="Skriv eller dikter her... f.eks. 'Lørdag 21 juni kl 14 er det bursdag hos naboen'"
        rows="3"
        inputmode="text"
        autocomplete="off"
      ></textarea>

      <div class="voice-who-label field-label">Hvem gjelder det?</div>
      <div class="who-buttons">
        <button class="who-btn" id="voice-who-mom" onclick="selectVoiceWho('mom')">👩 Mor</button>
        <button class="who-btn" id="voice-who-dad" onclick="selectVoiceWho('dad')">👨 Far</button>
        <button class="who-btn" id="voice-who-both" onclick="selectVoiceWho('both')">👨‍👩‍ Begge</button>
      </div>

      <div id="voice-status" class="voice-status hidden"></div>

      <div class="modal-actions">
        <button class="btn-save" onclick="processVoiceInput()">✨ Fyll inn automatisk</button>
        <button class="btn-cancel" onclick="closeVoiceModal()">Avbryt</button>
      </div>
    </div>
  </div>

  <!-- ===== ADD/EDIT MODAL ===== -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
    <div class="modal">
      <h2 class="modal-title" id="modal-title">Ny hendelse</h2>

      <label class="field-label" for="event-title">Hva skjer?</label>
      <input
        type="text"
        id="event-title"
        class="field-input"
        placeholder="t.d. Legetimebestilling..."
        autocomplete="off"
        inputmode="text"
      />

      <label class="field-label" for="event-date">Dato</label>
      <input type="date" id="event-date" class="field-input" />

      <label class="field-label" for="event-time">Tid (valgfritt)</label>
      <input type="time" id="event-time" class="field-input" />

      <label class="field-label">Hvem?</label>
      <div class="who-buttons">
        <button class="who-btn" id="who-mom" onclick="selectWho('mom')">👩 Mor</button>
        <button class="who-btn" id="who-dad" onclick="selectWho('dad')">👨 Far</button>
        <button class="who-btn" id="who-both" onclick="selectWho('both')">👨‍👩‍ Begge</button>
      </div>

      <label class="field-label" for="event-note">Notat (valgfritt)</label>
      <textarea
        id="event-note"
        class="field-input field-textarea"
        placeholder="Ekstra informasjon..."
        rows="2"
      ></textarea>

      <div class="modal-actions">
        <button class="btn-save" onclick="saveEvent()">💾 Lagre</button>
        <button class="btn-delete hidden" id="btn-delete" onclick="deleteEvent()">🗑 Slett</button>
        <button class="btn-cancel" onclick="closeModal()">Avbryt</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast hidden"></div>

  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
